<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>สะสม (Sasam) - เข้าสู่ระบบ</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
    <div id="login-app" class="app-container">
        <!-- Loading Overlay -->
        <div v-if="loading" class="loading-overlay">
            <div class="spinner"></div>
        </div>

        <div class="login-container">
            <div class="login-box">
                <h1><i class="fa-solid fa-layer-group"></i> <span class="accent">สะสม</span></h1>
                <p class="tagline">แพลตฟอร์มสะสมการ์ดออนไลน์</p>

                <!-- <button @click="loginWithLINE" class="login-line-btn">
                    <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M24 10.304c0-5.369-5.383-9.738-12-9.738-6.616 0-12 4.369-12 9.738 0 4.814 3.963 8.948 9.53 9.608.371.077.868.238 1 .558.113.275.074.707.035 1.002-.046.331-.301 1.776-.364 2.158-.087.525-.407 1.99 1.737 1.085 2.144-.906 11.536-6.793 11.83-11.543H24c0-.022 0-.044 0-.066-.026-1.127-.089-2.227-.146-2.8z"/></svg>
                    เข้าสู่ระบบด้วย LINE
                </button>

                <div class="login-divider">
                    <div class="line"></div>
                    <span>หรือ</span>
                    <div class="line"></div>
                </div> -->

                <label>ชื่อผู้ใช้งาน</label>
                <input type="text" v-model="loginUsername" @keyup.enter="loginManually" placeholder="กรอกชื่อผู้ใช้ของคุณ...">

                <button @click="loginManually" class="login-submit-btn">
                    เข้าใช้งาน / สมัครสมาชิก
                </button>
                <a href="#" @click.prevent="loginAsTest" class="test-login-link"><i class="fa-solid fa-flask"></i> เข้าทดสอบระบบ</a>
            </div>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
